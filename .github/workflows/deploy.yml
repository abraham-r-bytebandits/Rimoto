name: Deploy Rimoto Frontend to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install & Build
        run: |
          npm ci
          npm run build

      # 👇 ONLY copy required files (huge speed improvement)
      - name: Copy build to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: ".next,public,package.json,package-lock.json,next.config.ts"
          target: "/home/ec2-user/rimoto-frontend"

      - name: Start app on EC2 (NO BUILD)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ec2-user/rimoto-frontend

            echo "Installing production deps..."
            npm ci --omit=dev

            echo "Restarting app..."
            pm2 describe rimoto-frontend > /dev/null 2>&1 \
              && pm2 restart rimoto-frontend --update-env \
              || pm2 start npm --name "rimoto-frontend" -- start

            pm2 save